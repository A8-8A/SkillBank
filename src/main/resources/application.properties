spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/skillbank}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:skillbank}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:skillbank123}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${JWT_SECRET:3d8f2a1c9e7b4f6d0a2c5e8b1d4f7a9c2e5b8d1f4a7c0e3b6d9f2a5c8e1b4d7}
