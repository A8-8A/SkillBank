services:
  postgres:
    image: postgres:16-alpine
    container_name: skillbank-db
    environment:
      POSTGRES_DB: skillbank
      POSTGRES_USER: skillbank
      POSTGRES_PASSWORD: skillbank123
    ports:
      - "5432:5432"
    volumes:
      - skillbank_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  skillbank_data:
